name: Déploiement en continu

on:
    push:
      tags:
      - 'PersonApp-V*'

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore person_wpf_demo.sln
      - run: dotnet build person_wpf_demo.sln --no-restore --configuration Release
      - run: dotnet test person_wpf_demo_tests/person_wpf_demo_tests.csproj --verbosity normal

  publish:
    runs-on: windows-latest
    needs: test #Revalide que les tests passent pour déployer

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Publish WPF app
      run: >
        dotnet publish person_wpf_demo/person_wpf_demo.csproj
        --configuration Release
        --runtime win-x64
        --self-contained true
        --output publish

    - name: Create ZIP archive
      run: Compress-Archive -Path publish/* -DestinationPath person_wpf_demo.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        files: person_wpf_demo.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
